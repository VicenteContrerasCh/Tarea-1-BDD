{% extends 'base.html' %}
{% block title %}Inscripciones{% endblock %}
{% block content %}
<h2>Formulario de inscripción</h2>
<form method="post" class="form-box">
    <label for="torneo_id">Torneo</label>
    <select name="torneo_id" id="torneo_id" required>
        <option value="">Selecciona un torneo</option>
        {% for torneo in torneos %}
        <option value="{{ torneo.id }}">{{ torneo.nombre }} ({{ torneo.inscritos }}/{{ torneo.max_equipos }})</option>
        {% endfor %}
    </select>

    <label for="equipo_id">Equipo</label>
    <select name="equipo_id" id="equipo_id" required>
        <option value="">Selecciona un equipo</option>
        {% for equipo in equipos %}
        <option value="{{ equipo.id }}">{{ equipo.nombre }}</option>
        {% endfor %}
    </select>

    <button type="submit">Inscribir equipo</button>
</form>

<h3>Inscripciones actuales</h3>
<table>
    <thead>
        <tr>
            <th>Torneo</th>
            <th>Equipo</th>
        </tr>
    </thead>
    <tbody>
        {% for fila in inscripciones_actuales %}
        <tr>
            <td>{{ fila.torneo }}</td>
            <td>{{ fila.equipo }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
